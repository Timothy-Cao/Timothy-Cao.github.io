<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" rx="12" fill="#0a0e1a"/>

  <!-- Polar grid - concentric circles -->
  <g opacity="0.18">
    <circle cx="200" cy="130" r="30" fill="none" stroke="#38bdf8" stroke-width="0.5"/>
    <circle cx="200" cy="130" r="60" fill="none" stroke="#38bdf8" stroke-width="0.5"/>
    <circle cx="200" cy="130" r="90" fill="none" stroke="#38bdf8" stroke-width="0.5"/>
    <circle cx="200" cy="130" r="120" fill="none" stroke="#38bdf8" stroke-width="0.4"/>
    <!-- Radial lines -->
    <line x1="200" y1="130" x2="200" y2="0" stroke="#38bdf8" stroke-width="0.3"/>
    <line x1="200" y1="130" x2="200" y2="260" stroke="#38bdf8" stroke-width="0.3"/>
    <line x1="200" y1="130" x2="80" y2="130" stroke="#38bdf8" stroke-width="0.3"/>
    <line x1="200" y1="130" x2="320" y2="130" stroke="#38bdf8" stroke-width="0.3"/>
    <line x1="200" y1="130" x2="285" y2="45" stroke="#38bdf8" stroke-width="0.3"/>
    <line x1="200" y1="130" x2="115" y2="215" stroke="#38bdf8" stroke-width="0.3"/>
    <line x1="200" y1="130" x2="285" y2="215" stroke="#38bdf8" stroke-width="0.3"/>
    <line x1="200" y1="130" x2="115" y2="45" stroke="#38bdf8" stroke-width="0.3"/>
  </g>

  <!-- Polar curve: r = cos(3*theta) - three-petal rose -->
  <path d="M200,130 C215,105 250,70 260,65 C270,60 265,75 250,90
           C235,105 215,120 200,130
           C185,120 150,80 140,70
           C130,60 130,75 145,95
           C160,115 185,125 200,130
           C200,145 215,190 210,200
           C205,210 195,205 190,190
           C185,175 190,150 200,130Z"
        fill="none" stroke="#22d3ee" stroke-width="2" opacity="0.8"/>

  <!-- Polar curve: cardioid r = 1 + cos(theta) -->
  <path d="M320,130 C320,160 300,200 270,210
           C240,220 200,210 180,190
           C160,170 150,145 155,125
           C160,105 175,85 195,75
           C215,65 250,70 275,85
           C300,100 320,115 320,130Z"
        fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.5"/>

  <!-- Glowing dots at curve intersections -->
  <circle cx="260" cy="65" r="3" fill="#22d3ee" opacity="0.9"/>
  <circle cx="140" cy="70" r="3" fill="#22d3ee" opacity="0.9"/>
  <circle cx="210" cy="200" r="3" fill="#22d3ee" opacity="0.9"/>
  <circle cx="200" cy="130" r="4" fill="#f0abfc" opacity="0.7"/>

  <!-- Angle labels -->
  <text x="205" y="18" font-family="monospace" font-size="9" fill="#38bdf8" opacity="0.4">0</text>
  <text x="325" y="134" font-family="monospace" font-size="9" fill="#38bdf8" opacity="0.4">&#960;/2</text>
  <text x="205" y="258" font-family="monospace" font-size="9" fill="#38bdf8" opacity="0.4">&#960;</text>
  <text x="62" y="134" font-family="monospace" font-size="9" fill="#38bdf8" opacity="0.4">3&#960;/2</text>

  <!-- Equation hint -->
  <text x="305" y="50" font-family="monospace" font-size="10" fill="#22d3ee" opacity="0.35">r = cos(3&#952;)</text>

  <!-- Title -->
  <text x="200" y="268" text-anchor="middle" font-family="monospace" font-size="22" font-weight="bold" fill="#38bdf8">Polar Intuition</text>
  <text x="200" y="288" text-anchor="middle" font-family="monospace" font-size="11" fill="#e0e0e0" opacity="0.5">polar functions  |  visual training</text>
</svg>
