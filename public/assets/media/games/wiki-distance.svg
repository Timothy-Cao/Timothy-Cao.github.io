<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="wd-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a14"/>
      <stop offset="100%" stop-color="#1c1c2a"/>
    </linearGradient>
    <radialGradient id="wd-halo" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="400" height="400" fill="url(#wd-bg)"/>
  <rect width="400" height="400" fill="url(#wd-halo)"/>

  <!-- subtle dotted grid -->
  <g fill="#ffffff" opacity="0.08">
    <circle cx="40" cy="60" r="1.4"/>
    <circle cx="100" cy="100" r="1.4"/>
    <circle cx="160" cy="60" r="1.4"/>
    <circle cx="340" cy="80" r="1.4"/>
    <circle cx="60" cy="220" r="1.4"/>
    <circle cx="120" cy="340" r="1.4"/>
    <circle cx="260" cy="320" r="1.4"/>
    <circle cx="320" cy="260" r="1.4"/>
    <circle cx="220" cy="40" r="1.4"/>
    <circle cx="380" cy="200" r="1.4"/>
  </g>

  <!-- Left article tile (Wikipedia W) -->
  <g transform="translate(78,170)">
    <rect x="-50" y="-50" width="100" height="100" rx="14" fill="#f5f5f7" stroke="#e5e5ec" stroke-width="1.5"/>
    <!-- Title line under W -->
    <rect x="-32" y="22" width="64" height="3" rx="1.5" fill="#bcbcc6"/>
    <rect x="-32" y="32" width="42" height="3" rx="1.5" fill="#d9d9e0"/>
    <!-- Wikipedia-style W glyph -->
    <text x="0" y="6" text-anchor="middle"
          font-family="Times New Roman, Georgia, serif"
          font-size="62" font-weight="400" fill="#0a0a14">W</text>
  </g>

  <!-- Right article tile (Wikipedia W) -->
  <g transform="translate(322,230)">
    <rect x="-50" y="-50" width="100" height="100" rx="14" fill="#f5f5f7" stroke="#e5e5ec" stroke-width="1.5"/>
    <rect x="-32" y="22" width="64" height="3" rx="1.5" fill="#bcbcc6"/>
    <rect x="-32" y="32" width="42" height="3" rx="1.5" fill="#d9d9e0"/>
    <text x="0" y="6" text-anchor="middle"
          font-family="Times New Roman, Georgia, serif"
          font-size="62" font-weight="400" fill="#0a0a14">W</text>
  </g>

  <!-- Path with intermediate hops -->
  <g fill="none" stroke="#7c8aff" stroke-width="2.5" stroke-linecap="round">
    <path d="M 128 170 Q 175 110 220 150 Q 260 185 272 230"
          stroke-dasharray="6 7"/>
  </g>

  <!-- Intermediate hop nodes -->
  <g>
    <circle cx="175" cy="118" r="6" fill="#7c8aff"/>
    <circle cx="175" cy="118" r="11" fill="none" stroke="#7c8aff" stroke-opacity="0.35" stroke-width="1.5"/>
    <circle cx="222" cy="152" r="6" fill="#7c8aff"/>
    <circle cx="222" cy="152" r="11" fill="none" stroke="#7c8aff" stroke-opacity="0.35" stroke-width="1.5"/>
  </g>

  <!-- Distance badge in the middle of the path -->
  <g transform="translate(200,80)">
    <rect x="-34" y="-20" width="68" height="40" rx="20" fill="#0a0a14" stroke="#7c8aff" stroke-width="1.8"/>
    <text x="0" y="-3" text-anchor="middle"
          font-family="ui-sans-serif, system-ui, sans-serif"
          font-size="10" font-weight="600" letter-spacing="2"
          fill="#9aa6ff">HOPS</text>
    <text x="0" y="14" text-anchor="middle"
          font-family="ui-sans-serif, system-ui, sans-serif"
          font-size="16" font-weight="700" fill="#ffffff">3</text>
  </g>

  <!-- Tiny corner label -->
  <text x="30" y="376" font-family="ui-monospace, monospace" font-size="11"
        fill="#7c8aff" opacity="0.7" letter-spacing="2">WIKI · DISTANCE</text>
</svg>
