  <!-- title -->
  <text x="200" y="80" text-anchor="middle" fill="#e94560" font-family="monospace" font-size="28" font-weight="bold">TYPERACER</text>
  <text x="200" y="104" text-anchor="middle" fill="#e0e0e0" font-family="monospace" font-size="13">test your speed</text>
