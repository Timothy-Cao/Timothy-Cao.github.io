<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="nq-bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#1a1130"/>
      <stop offset="100%" stop-color="#070811"/>
    </radialGradient>
    <linearGradient id="nq-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff9b3d"/>
      <stop offset="100%" stop-color="#ff5722"/>
    </linearGradient>
    <filter id="nq-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#nq-bg)"/>

  <!-- Subtle orbit rings -->
  <g stroke="#ff9b3d" stroke-width="1" fill="none" opacity="0.12">
    <circle cx="200" cy="200" r="160"/>
    <circle cx="200" cy="200" r="130"/>
    <circle cx="200" cy="200" r="100"/>
  </g>

  <!-- Uzumaki-style spiral, the signature crest -->
  <g transform="translate(200,200)" filter="url(#nq-glow)">
    <path
      d="M 0 0
         m 0 -8
         a 8 8 0 1 1 0 16
         a 24 24 0 1 1 0 -48
         a 44 44 0 1 1 0 88
         a 64 64 0 1 1 0 -128
         a 84 84 0 1 1 0 168"
      fill="none"
      stroke="url(#nq-orange)"
      stroke-width="10"
      stroke-linecap="round"
    />
  </g>

  <!-- Three corner question-mark accents to hint 'quiz' -->
  <g fill="#ff9b3d" opacity="0.55" font-family="ui-sans-serif, system-ui, sans-serif" font-weight="700" font-size="28">
    <text x="42" y="58">?</text>
    <text x="334" y="64">?</text>
    <text x="48" y="358">?</text>
    <text x="338" y="362">?</text>
  </g>
</svg>
