<!DOCTYPE html>
<html lang="en">
<head>

</head>
<body>

  <div class="container">
    <div class="row">
      <div class="col-lg-8 col-lg-offset-2">
        <div class="modal-body">
          <!-- Single Post Content Goes Here -->
          {{ content }}

            <i class="fa fa-times"></i> Close
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Include your site-wide JavaScript files -->
  {% include js.html %}
</body>
</html>
