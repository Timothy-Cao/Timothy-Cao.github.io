<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      padding-top: 50px; /* Adjust the padding to match the height of your navbar */
    }
    .navbar {
      background-color: #2c3e50;
      overflow: hidden;
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;
    }
    .navbar a {
      float: left;
      display: block;
      color: white;
      text-align: center;
      padding: 14px 16px;
      text-decoration: none;
      font-size: 17px;
    }
    .navbar a:hover {
      background-color: #ddd;
      color: black;
    }
    .content {
      padding: 16px;
    }
  </style>
</head>
<body>

<div class="navbar">
  <a href="https://timothy-cao.github.io/">Timothy Cao</a>
  <a href="https://timothy-cao.github.io/#portfolio">PORTFOLIO</a>
  <a href="https://timothy-cao.github.io/#about">ABOUT</a>
  <a href="https://timothy-cao.github.io/#contact">CONTACT</a>
</div>

<div class="content">
  {{ content }}
</div>

</body>
</html>
