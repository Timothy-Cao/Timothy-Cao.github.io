<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>
  <link href="//fonts.googleapis.com/css?family=Montserrat:400,700" rel="stylesheet" type="text/css">
  <link href="//fonts.googleapis.com/css?family=Lato:400,700,400italic,700italic" rel="stylesheet" type="text/css">
  <style>
    body {
      margin: 0;
      font-family: 'Lato', sans-serif;
      padding-top: 60px; /* Adjust the padding to match the height of your navbar */
    }
    .navbar {
      background-color: #2c3e50;
      overflow: hidden;
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;
      font-family: 'Montserrat', sans-serif;
    }
    .navbar a {
      float: none;
      display: block;
      text-align: center;
      color: white;
      padding: 20px;
      text-decoration: none;
      font-size: 22px;
    }
    .content {
      padding: 16px;
      max-width: 800px;
      margin: auto;
    }
    img, iframe {
      max-width: 100%;
      height: auto;
    }
    @media (max-width: 768px) {
      .navbar a {
        padding: 10px;
        font-size: 18px;
      }
      .content {
        padding: 10px;
      }
      img, iframe {
        width: 100%;
      }
    }
  </style>
</head>
<body>

<div class="navbar">
  <a href="https://timothy-cao.github.io/">HOME</a>
</div>

<div class="content">
  {{ content }}
</div>

<script>
  // This script ensures that YouTube iframes are responsive
  document.addEventListener("DOMContentLoaded", function() {
    var iframes = document.getElementsByTagName('iframe');
    for (var i = 0; i < iframes.length; i++) {
      if (iframes[i].src.includes("youtube.com")) {
        iframes[i].parentNode.style.position = 'relative';
        iframes[i].parentNode.style.paddingBottom = '56.25%'; // for 16:9 aspect ratio
        iframes[i].parentNode.style.height = 0;
        iframes[i].style.position = 'absolute';
        iframes[i].style.width = '100%';
        iframes[i].style.height = '100%';
        iframes[i].style.left = '0';
      }
    }
  });
</script>

</body>
</html>
