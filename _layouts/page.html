<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Ensure your head.html includes the correct paths to your CSS files and FontAwesome for the icon -->
  {% include head.html %}
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
    }
    .page-container {
      margin: 40px auto;
      padding: 20px;
      max-width: 1200px;
      position: relative;
    }
    .close-modal-button {
      position: fixed;
      top: 20px;
      right: 20px;
      cursor: pointer;
      border: none;
      background: transparent;
      font-size: 48px; /* Further increase the size of the 'X' */
      z-index: 1052; /* Ensure it's above the navbar */
      line-height: 0.8;
    }
    .content {
      padding: 20px;
    }
    .navbar-custom {
      border-bottom: 1px solid #e7e7e7;
      background-color: #fff;
      z-index: 1051; /* Ensure the navbar is below the close button */
    }
    .navbar-custom .navbar-nav > li > a {
      color: #777;
    }
    .navbar-custom .navbar-brand {
      color: #555;
    }
  </style>
</head>
<body>

  {% include nav.html %}

  <div class="page-container">
    <div class="content">
      <!-- Single Post Content Goes Here -->
      {{ content }}
    </div>
  </div>

  <!-- Close Button using 'X' icon -->
  <button class="close-modal-button" onclick="location.href='/';">
    &times; <!-- This is a simple 'X' character, use FontAwesome icon if preferred -->
  </button>

  <!-- Include your site-wide JavaScript files -->
  {% include js.html %}
</body>
</html>
