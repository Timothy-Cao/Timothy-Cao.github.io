<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Ensure your head.html includes the correct paths to your CSS files and FontAwesome for the icon -->
  {% include head.html %}
  <style>
    .close-modal-button {
      position: absolute;
      top: 20px;
      right: 20px;
      cursor: pointer;
      border: none;
      background: transparent;
      font-size: 24px;
      z-index: 1051; /* Ensure it's above other content */
    }
  </style>
</head>
<body>

  <div class="container" style="position: relative;">
    <!-- Close Button -->
    <button class="close-modal-button" onclick="history.back();">
      <i class="fa fa-times"></i>
    </button>
    
    <div class="row">
      <div class="col-lg-8 col-lg-offset-2">
        <div class="modal-body">
          <!-- Single Post Content Goes Here -->
          {{ content }}
        </div>
      </div>
    </div>
  </div>

  <!-- Include your site-wide JavaScript files -->
  {% include js.html %}
</body>
</html>
