<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Include the header and navigation -->
  {% include head.html %}
</head>
<body>

  {% include nav.html %}

  <div class="page-container">
    <div class="content">
      <!-- Content from the Markdown file will be inserted here -->
      {{ content }}
    </div>
  </div>

  <!-- Close Button using 'X' icon, fixed to the top-right of the viewport -->
  <button class="close-modal-button" onclick="location.href='/';">
    &times;
  </button>

  <!-- Include your site-wide JavaScript files -->
  {% include js.html %}
  
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
      padding-top: 50px; /* Make space for the fixed navbar */
    }
    .page-container {
      margin: 40px auto;
      padding: 20px;
      max-width: 1200px;
      position: relative;
    }
    .close-modal-button {
      position: fixed;
      top: 20px;
      right: 20px;
      cursor: pointer;
      border: none;
      background: transparent;
      font-size: 48px; /* Adjust the size of the 'X' as needed */
      z-index: 2000; /* Ensure it's above all other content */
      line-height: 0.8;
    }
    .content {
      padding: 20px;
    }
    /* Adjust or remove additional styles if they were added for .navbar-custom */
  </style>
</body>
</html>
