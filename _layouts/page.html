<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>
  <link href="//fonts.googleapis.com/css?family=Montserrat:400,700" rel="stylesheet" type="text/css">
  <link href="//fonts.googleapis.com/css?family=Lato:400,700,400italic,700italic" rel="stylesheet" type="text/css">
  <style>
    body {
      margin: 0;
      font-family: 'Lato', sans-serif;
      padding-top: 60px; /* Adjust the padding to match the height of your navbar */
    }
    .navbar {
      background-color: #2c3e50;
      overflow: hidden;
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;
      font-family: 'Montserrat', sans-serif;
    }
    .navbar a {
      float: left;
      display: block;
      color: white;
      text-align: center;
      padding: 20px;
      text-decoration: none;
      font-size: 22px; /* Increased font size for better visibility */
    }
    .content {
      padding: 16px;
      max-width: 800px; /* Maximum width for the content */
      margin: auto; /* Centers the content */
    }
    @media (max-width: 768px) {
      .navbar a {
        padding: 10px;
        font-size: 18px; /* Smaller font size on mobile */
      }
      .content {
        padding: 10px;
      }
    }
  </style>
</head>
<body>

<div class="navbar">
  <a href="https://timothy-cao.github.io/">TIMOTHY CAO</a>
</div>

<div class="content">
  {{ content }}
</div>

</body>
</html>
