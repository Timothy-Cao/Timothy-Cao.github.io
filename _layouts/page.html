<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>
  <link href="//fonts.googleapis.com/css?family=Montserrat:400,700" rel="stylesheet" type="text/css">
  <link href="//fonts.googleapis.com/css?family=Lato:400,700,400italic,700italic" rel="stylesheet" type="text/css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.1.1/css/all.min.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Lato', sans-serif;
      padding-top: 60px; /* Adjust the padding to match the height of your navbar */
    }
    .navbar {
      background-color: #2c3e50;
      overflow: hidden;
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 1000;
      font-family: 'Montserrat', sans-serif;
      margin-left: 10px; /* Adjust the margin as needed */
    }
    .navbar a {
      float: none;
      display: block;
      text-align: center;
      color: white;
      padding: 20px;
      text-decoration: none;
      font-size: 22px;
    }
    .content {
      padding: 16px;
      max-width: 800px;
      margin: auto;
    }
    img, iframe {
      max-width: 100%;
      height: auto;
    }
    @media (max-width: 768px) {
      .navbar a {
        padding: 10px;
        font-size: 18px;
      }
      .content {
        padding: 10px;
      }
      img, iframe {
        width: 100%;
      }
    }
  </style>
</head>
<body>

<div class="navbar">
  <a href="https://timothy-cao.github.io/"><i class="fa fa-home"></i> HOME</a>
</div>
<div class="navbar">
  <a href="https://timothy-cao.github.io/">HOME</a>
</div>

<div class="content">
  {{ content }}
</div>

</body>
</html>
