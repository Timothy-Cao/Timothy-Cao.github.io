<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Ensure your head.html includes the correct paths to your CSS files and FontAwesome for the icon -->
  {% include head.html %}
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
    }
    .page-container {
      margin: 40px auto; /* Adjust the margin value to increase or decrease the side margins */
      padding: 20px;
      max-width: 1200px; /* Set max width for larger screens */
      position: relative; /* For the positioning of the close button */
      background: #ffffff; /* Background for the content area */
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1); /* Adds a slight shadow for some depth */
    }
    .close-modal-button {
      position: absolute;
      top: 20px; /* Adjust the top position to move the button inside the content area */
      right: 20px; /* Adjust the right position to move the button inside the content area */
      cursor: pointer;
      border: none;
      background: transparent;
      font-size: 32px; /* Increase the font-size for a larger 'X' */
      z-index: 1051; /* Ensure it's above other content */
      line-height: 0.8; /* Adjust line height to reduce the button height */
    }
    .content {
      padding: 20px;
      box-shadow: none; /* Since the shadow is on the container, no need for it here */
    }
  </style>
</head>
<body>

  <div class="page-container">
    <!-- Close Button using 'X' icon -->
    <button class="close-modal-button" onclick="history.back();">
      &times; <!-- This is a simple 'X' character, use FontAwesome icon if preferred -->
    </button>
    
    <div class="content">
      <!-- Single Post Content Goes Here -->
      {{ content }}
    </div>
  </div>

  <!-- Include your site-wide JavaScript files -->
  {% include js.html %}
</body>
</html>
