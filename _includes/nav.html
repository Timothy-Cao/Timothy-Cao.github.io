<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Ensure your head.html includes the correct paths to your CSS files -->
  {% include head.html %}
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: sans-serif;
    }
    .page-container {
      margin: 0 auto; /* Full width */
      padding-top: 50px; /* Provide padding to ensure content isn't hidden behind the navbar */
    }
    .close-modal-button {
      position: fixed;
      top: 10px; /* Distance from the top of the viewport */
      right: 10px; /* Distance from the right of the viewport */
      cursor: pointer;
      border: none;
      background: transparent;
      font-size: 48px; /* Large font size for the 'X' */
      z-index: 1052; /* Above navbar's z-index */
    }
    .content {
      padding: 20px;
    }
    /* Navigation bar styles */
    .navbar {
      margin-bottom: 0; /* Remove margin at the bottom of the navbar */
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav class="navbar navbar-default navbar-fixed-top">
    <div class="container">
      <!-- Brand and toggle get grouped for better mobile display -->
      <div class="navbar-header page-scroll">
        <button type="button" class="navbar-toggle" data-toggle="collapse" data-target="#bs-example-navbar-collapse-1">
          <span class="sr-only">Toggle navigation</span>
          <span class="icon-bar"></span>
          <span class="icon-bar"></span>
          <span class="icon-bar"></span>
        </button>
        <a class="navbar-brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>
      </div>

      <!-- Collect the nav links, forms, and other content for toggling -->
      <div class="collapse navbar-collapse" id="bs-example-navbar-collapse-1">
        <ul class="nav navbar-nav navbar-right">
          <li class="page-scroll">
            <a href="{{ '/' | relative_url }}">Portfolio</a>
          </li>
          <li class="page-scroll">
            <a href="{{ '/' | relative_url }}">About</a>
          </li>
          <li class="page-scroll">
            <a href="{{ '/' | relative_url }}">Contact</a>
          </li>
        </ul>
      </div>
      <!-- /.navbar-collapse -->
    </div>
    <!-- /.container-fluid -->
  </nav>

  <div class="page-container">
    <!-- Close Button using 'X' icon -->
    <button class="close-modal-button" onclick="history.back();">
      &times; <!-- This is a simple 'X' character, use FontAwesome icon if preferred -->
    </button>
    
    <div class="content">
      <!-- Single Post Content Goes Here -->
      {{ content }}
    </div>
  </div>

  <!-- Include your site-wide JavaScript files -->
  {% include js.html %}
</body>
</html>
